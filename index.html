<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sKladMan</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#" class="logo-wrap"><span class="logo-text">sKladMan</span></a>
    <nav class="header-nav">
      <button class="nav-btn active" id="nav-all">Всі товари</button>
      <button class="nav-btn" id="nav-sale">Розпродаж</button>
    </nav>
    <div class="header-right">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="Пошук товарів...">
      </div>
      <div class="lang-switch">
        <button class="lang-btn" id="lang-uk">УКР</button>
        <button class="lang-btn" id="lang-en">ENG</button>
      </div>
      <button class="cart-btn" id="cart-toggle" aria-label="Кошик">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count" id="cart-count" style="display:none">0</span>
      </button>
    </div>
  </div>
</header>

<div class="filters-bar">
  <div class="filters-inner">
    <button class="filter-toggle-btn" id="filter-toggle-btn" onclick="openFilters()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>
      <span id="filter-btn-label">Фільтри</span>
      <span class="filter-active-count" id="filter-active-count" style="display:none"></span>
    </button>
    <div class="filter-chips" id="filter-chips"></div>
    <div class="filter-right">
      <span class="results-count" id="results-count"></span>
      <div class="sort-group">
        <span class="filter-label">Сортування</span>
        <select class="filter-select" id="filter-sort"></select>
      </div>
    </div>
  </div>
</div>

<div id="filter-drawer">
  <div id="filter-overlay" onclick="closeFilters()"></div>
  <div class="filter-panel">
    <div class="filter-panel-header">
      <h2 class="filter-panel-title">Усі фільтри</h2>
      <button class="filter-panel-close" onclick="closeFilters()">✕</button>
    </div>
    <div class="filter-panel-body" id="filter-panel-body"></div>
    <div class="filter-panel-footer">
      <button class="btn-clear-filters" onclick="clearFilters()">Скинути</button>
      <button class="btn-show-results" id="btn-show-results" onclick="closeFilters()">Показати результати</button>
    </div>
  </div>
</div>

<main class="main-content">
  <div id="product-grid"></div>
</main>

<div id="modal" role="dialog" aria-modal="true">
  <div id="modal-overlay"></div>
  <div class="modal-content">
    <button id="modal-close" aria-label="Закрити">✕</button>
    <div class="modal-gallery"></div>
    <div class="modal-info"></div>
  </div>
</div>

<div id="cart-drawer">
  <div id="cart-overlay"></div>
  <div class="cart-panel">
    <div class="cart-header">
      <h2 class="cart-title" id="cart-title">Кошик</h2>
      <button class="cart-close" id="cart-close">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer" id="cart-footer"></div>
  </div>
</div>

<div id="order-modal">
  <div id="order-overlay" onclick="closeOrderForm()"></div>
  <div class="order-panel">

    <div class="order-header">
      <div class="order-steps">
        <span class="order-step active" data-step="1">1. Контакти</span>
        <span class="order-step-sep">›</span>
        <span class="order-step" data-step="2">2. Доставка</span>
        <span class="order-step-sep">›</span>
        <span class="order-step" data-step="3">3. Оплата</span>
      </div>
      <button class="order-close" onclick="closeOrderForm()">✕</button>
    </div>

    <div class="order-body">
      <div class="order-summary" id="order-summary"></div>

      <div class="order-step-content active" id="step-1">
        <div class="order-form">
          <p class="step-section-title">Контактна інформація</p>
          <div class="form-row">
            <label class="form-label" id="lbl-name">Ім'я та прізвище *</label>
            <input class="form-input" type="text" id="f-name" placeholder="Іван Петренко" autocomplete="name">
          </div>
          <div class="form-row">
            <label class="form-label" id="lbl-phone">Номер телефону *</label>
            <input class="form-input" type="tel" id="f-phone" placeholder="+380 xx xxx xx xx" autocomplete="tel">
          </div>
          <div class="form-row">
            <label class="form-label" id="lbl-instagram">Instagram</label>
            <input class="form-input" type="text" id="f-instagram" placeholder="@username">
          </div>
          <div class="form-row">
            <label class="form-label" id="lbl-comment">Коментар</label>
            <textarea class="form-input form-textarea" id="f-comment" rows="2" placeholder="Будь-які побажання..."></textarea>
          </div>
        </div>
        <div class="order-step-footer">
          <div></div>
          <button class="btn-order-next pulse-btn" onclick="goToStep(2)" type="button">
            Далі
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
          </button>
        </div>
      </div>

      <div class="order-step-content" id="step-2">
        <div class="order-form">
          <p class="step-section-title">Спосіб доставки</p>
          <div class="delivery-options">
            <label class="delivery-option">
              <input type="radio" name="delivery" value="nova_poshta" checked onchange="onDeliveryChange(this.value)">
              <div class="delivery-option-body"><span class="delivery-name">Нова Пошта — відділення</span></div>
            </label>
            <label class="delivery-option">
              <input type="radio" name="delivery" value="nova_poshta_poshtamat" onchange="onDeliveryChange(this.value)">
              <div class="delivery-option-body"><span class="delivery-name">Нова Пошта — поштомат</span></div>
            </label>
            <label class="delivery-option">
              <input type="radio" name="delivery" value="nova_poshta_courier" onchange="onDeliveryChange(this.value)">
               <div class="delivery-option-body"><span class="delivery-name">Нова Пошта — кур'єр</span></div>
            </label>
            <label class="delivery-option">
              <input type="radio" name="delivery" value="ukrposhta" onchange="onDeliveryChange(this.value)">
              <div class="delivery-option-body"><span class="delivery-name">Укрпошта</span></div>
            </label>
          </div>

          <div class="form-section-divider"></div>
          <p class="step-section-title" style="margin-top:0">Адреса отримання</p>

          <div id="np-group" class="animated-group">
            <div class="form-row" id="city-row">
              <label class="form-label" id="lbl-city">Місто / Населений пункт *</label>
              <div class="np-autocomplete-wrap">
                <input class="form-input" type="text" id="f-city"
                  placeholder="Почніть вводити назву міста..."
                  oninput="onCityInput(this.value)"
                  onblur="scheduleDropdownClose('city-dropdown')"
                  autocomplete="off">
                <div class="np-dropdown" id="city-dropdown"></div>
              </div>
            </div>
            <div class="form-row" id="np-row">
              <label class="form-label" id="lbl-np">Відділення / Поштомат *</label>
              <div class="np-autocomplete-wrap">
                <input class="form-input" type="text" id="f-np"
                  placeholder="Спочатку оберіть місто"
                  oninput="onWarehouseInput(this.value)"
                  onfocus="onWarehouseInput(this.value)"
                  onblur="scheduleDropdownClose('np-dropdown')"
                  autocomplete="off" disabled>
                <div class="np-dropdown" id="np-dropdown"></div>
              </div>
            </div>
            <div class="form-row" id="address-row" style="display:none">
              <label class="form-label" id="lbl-address">Адреса доставки *</label>
              <input class="form-input" type="text" id="f-address" placeholder="вул. Хрещатик, 1, кв. 5" autocomplete="street-address">
            </div>
          </div>

          <div id="up-group" class="animated-group" style="display:none; flex-direction:column; gap:14px;">
            <div class="form-row">
              <label class="form-label" id="lbl-up-city">Місто *</label>
              <input class="form-input" type="text" id="f-up-city" placeholder="м. Київ">
            </div>
            <div class="form-row">
              <label class="form-label" id="lbl-up-index">Поштовий індекс *</label>
              <input class="form-input" type="text" id="f-up-index" placeholder="01001">
            </div>
            <div class="form-row">
              <label class="form-label" id="lbl-up-address">Вулиця, будинок, квартира *</label>
              <input class="form-input" type="text" id="f-up-address" placeholder="вул. Хрещатик, 1, кв. 5">
            </div>
          </div>

        </div>
        <div class="order-step-footer">
          <button class="btn-order-back" onclick="showStep(1)" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5m7 7-7-7 7-7"/></svg>
            Назад
          </button>
          <button class="btn-order-next pulse-btn" onclick="goToStep(3)" type="button">
            Далі
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
          </button>
        </div>
      </div>

      <div class="order-step-content" id="step-3">
        <div class="order-form">
          <p class="step-section-title">Спосіб оплати</p>
          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="payment" value="mono" checked onchange="renderConfirmBox()">
              <div class="payment-option-body">
                <svg width="22" height="22" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="8" fill="#1B1B1B"/><path d="M8 28V12l12 10 12-10v16" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/></svg>
                <span><span class="payment-name">Переказ на Банку (Monobank)</span><span class="payment-desc">Apple Pay / Google Pay / Картка</span></span>
              </div>
            </label>
            
            <label class="payment-option disabled-option">
              <input type="radio" name="payment" value="privat" disabled>
              <div class="payment-option-body">
                <svg width="22" height="22" viewBox="0 0 40 40" fill="none" style="opacity:0.5"><rect width="40" height="40" rx="8" fill="#77BC1F"/><text x="8" y="28" font-family="Arial" font-weight="bold" font-size="16" fill="white">P</text></svg>
                <span><span class="payment-name">ПриватБанк <span class="badge-soon">Скоро</span></span><span class="payment-desc">Онлайн оплата тимчасово недоступна</span></span>
              </div>
            </label>

            <label class="payment-option">
              <input type="radio" name="payment" value="cod" onchange="renderConfirmBox()">
              <div class="payment-option-body">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                <span><span class="payment-name">Накладений платіж</span><span class="payment-desc">Оплата при отриманні +20 ₴</span></span>
              </div>
            </label>
          </div>

          <div class="form-section-divider"></div>
          <p class="step-section-title" style="margin-top:0">Підтвердження</p>
          <div class="order-confirm-box" id="order-confirm-box"></div>
        </div>
        <div class="order-step-footer">
          <button class="btn-order-back" onclick="showStep(2)" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5m7 7-7-7 7-7"/></svg>
            Назад
          </button>
          <button class="btn-order-submit pulse-btn" id="btn-order-submit" onclick="submitOrder()" type="button">
            <span id="btn-order-text">Підтвердити замовлення</span>
          </button>
        </div>
      </div>

      <div class="order-success" id="order-success" style="display:none">
        <div class="order-success-icon">✓</div>
        <h3 id="order-success-title">Замовлення прийнято!</h3>
        <p id="order-success-msg">Ми зв'яжемось з вами найближчим часом.</p>
        <p class="order-success-id" id="order-success-id"></p>
        
        <div id="order-success-details" style="width:100%; margin-top:10px;"></div>

        <button class="btn-order-close" type="button" onclick="closeOrderForm()">Закрити</button>
      </div>
    </div>
  </div>
</div>

<footer><p>© 2026 sKladMan — All rights reserved</p></footer>

<script src="js/app.js"></script>
</body>
</html>
